################
### MONITORS ###
################

monitor=,preferred,auto,1
#monitor=eDP-1,enable
#monitor=HDMI-A-1,preferred,auto,1

###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = alacritty
$fileManager = thunar
$menu = rofi -show drun

#################
### AUTOSTART ###
#################

exec-once = waybar & hypridle & hyprpaper & nm-applet
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = systemctl --user start hyprpolkitagent
exec-once = flatpak run com.dropbox.Client start

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME,Posy_Cursor
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 0
    gaps_out = 0

    border_size = 1

    col.active_border = rgba(235,219,178,0.4)
    col.inactive_border = rgba(0,0,0,1)

    resize_on_border = true

    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = no, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 0, 10, default
    animation = border, 0, 5.39, easeOutQuint
    animation = windows, 0, 4.79, easeOutQuint
    animation = windowsIn, 0, 4.1, easeOutQuint, slide right
    animation = windowsOut, 0, 1.49, linear, slide right
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0, 5, easeOutQuint, slidefade 100%
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = slave
    mfact = 0.6
}

misc {
    force_default_wallpaper = 0
    vfr = true
    disable_hyprland_logo = 0
    disable_splash_rendering = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = caps:ctrl_modifier
    kb_rules =

    follow_mouse = 1

    sensitivity = 0
    accel_profile = flat

    touchpad {
		disable_while_typing = true
        natural_scroll = true
        scroll_factor = 0.3
    }
}

#gesture = 3, horizontal, workspace

gestures {
    workspace_swipe_distance=1000
    workspace_swipe_min_speed_to_force=1
    workspace_swipe_create_new=true  
    workspace_swipe_cancel_ratio=0
    workspace_swipe_forever=true
}  

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, exec, hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact 70% 65%; dispatch centerwindow"
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, flatpak run org.mozilla.firefox
bind = $mainMod, F, fullscreen
#bind = $mainMod, M, layoutmsg, swapwithmaster
bind = $mainMod, L, exec, hyprlock
bind = $mainMod CTRL SHIFT, Q, exec, ~/.config/rofi/scripts/power.sh
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -i -p "Clipboard" -lines 5 -width 1000 | cliphist decode | wl-copy
bind = $mainMod SHIFT, e, exec, rofimoji --max-recent 0 --skin-tone neutral --action clipboard
bind = $mainMod SHIFT, S, exec, hyprshot -zm region output -o /home/me/Pictures/Screenshots

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod SHIFT, right, resizeactive, 100 0 
bind = $mainMod SHIFT, left, resizeactive, -100 0                                           
bind = $mainMod SHIFT, down, resizeactive, 0 100                                        
bind = $mainMod SHIFT, up, resizeactive, 0 -100

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod CTRL SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ 
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

