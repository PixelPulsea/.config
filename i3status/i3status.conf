general {
        colors = false
		interval = 5
}

order += "battery all"
order += "disk /"
order += "memory"
order += "tztime local"
order += "time"

battery all {
        format = "%status %percentage"
}

disk "/" {
        format = "Free Space: %avail"
}

memory {
        format = "Free RAM: %available"
        threshold_degraded = "1G"
        format_degraded = "MEMORY < %available"
}

tztime local {
        format = "Date: %m-%d"
}

time {
		format = "Time: %H:%M %p|"
}
