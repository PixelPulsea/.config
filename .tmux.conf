#keybindings
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g mouse on

#style
set -g status-position bottom
set -g status-style 'fg=#ebdbb2 bg=#1e2021'

set -g status-right-style 'fg=#ebdbb2 bg=#1d2021'
set -g status-right '%Y-%m-%d %H:%M '

setw -g window-status-current-style 'fg=#ebdbb2 bg=#282828'
